# ===============================
# Application Name
# ===============================
spring.application.name=f1-api

# ===============================
# Server Port
# Render sets the PORT environment variable. Defaults to 8080 locally.
# ===============================
server.port=${PORT:8080}

# ===============================
# Supabase PostgreSQL Connection
# These values work for local development out of the box.
# On Render, override them by setting environment variables:
#   SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
# (Spring Boot auto-maps SPRING_DATASOURCE_* env vars to these properties.)
# ===============================
spring.datasource.url=jdbc:postgresql://aws-1-us-west-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
spring.datasource.username=postgres.eytlhjybvmmmtcvbxyyr
spring.datasource.password=MotoRYX2026
spring.datasource.hikari.maximum-pool-size=5
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# JPA / Hibernate Configuration
# - ddl-auto=update: Hibernate auto-creates/updates tables based on JPA entities.
# - show-sql=true: Logs all SQL statements to the console for debugging.
# - open-in-view=false: Disables lazy-loading outside of transactions (best practice).
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ===============================
# Schema Initialization
# - init.mode=always: Runs schema.sql on every startup to ensure tables exist.
# - defer-datasource-initialization=true: Ensures schema.sql runs before Hibernate
#   validates entity mappings, preventing startup errors.
# ===============================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ===============================
# Google OAuth2 Configuration
# Used for "Sign in with Google" authentication.
# For local dev, set these env vars in your shell:
#   export GOOGLE_CLIENT_ID=your-actual-client-id
#   export GOOGLE_CLIENT_SECRET=your-actual-client-secret
# On Render, set GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET in the dashboard.
# ===============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# ===============================
# Frontend URL (for CORS and OAuth2 redirect)
# On Render, override with APP_FRONTEND_URL env var.
# ===============================
app.frontend.url=http://localhost:5173

# ===============================
# Session Cookie Configuration (cross-origin OAuth)
# SameSite=None + Secure required for cross-origin session cookies.
# ===============================
server.servlet.session.cookie.same-site=${COOKIE_SAME_SITE:lax}
server.servlet.session.cookie.secure=${COOKIE_SECURE:false}

#springdoc redirect to required url
springdoc.swagger-ui.path=/swagger-ui.html
