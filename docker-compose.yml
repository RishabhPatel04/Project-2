# ====================================
# MotoRYX — Docker Compose Configuration
# Builds and runs the Spring Boot backend container.
# The app connects to the remote Supabase PostgreSQL database
# using credentials defined in application.properties.
# ====================================

services:
  backend:
    build:
      context: ./Backend/f1-api
      dockerfile: Dockerfile
    container_name: motoryx-backend
    ports:
      - "8080:8080"
    environment:
      # Supabase credentials — matches ${SUPABASE_DB_*} in application.properties
      SUPABASE_DB_URL: jdbc:postgresql://aws-1-us-west-1.pooler.supabase.com:5432/postgres?sslmode=require
      SUPABASE_DB_USERNAME: postgres.eytlhjybvmmmtcvbxyyr
      SUPABASE_DB_PASSWORD: MotoRYX2026
    restart: unless-stopped
